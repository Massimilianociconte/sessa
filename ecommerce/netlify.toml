# NB: col runtime Next.js v5 il publish DEVE essere ".next" (il plugin valida
# che contenga l'output Next); asset statici e funzioni li smista il plugin.
[build]
  # Le preview non devono mai migrare implicitamente il database di produzione.
  command = "npx prisma generate && npm run build"
  publish = ".next"

[context.production]
  command = "npx prisma generate && npm run build"

[build.environment]
  NODE_VERSION = "24"
  NEXT_TELEMETRY_DISABLED = "1"
  # Sono esclusi solo valori pubblici/non sensibili. Credenziali DB, sessione,
  # setup, Stripe e SMTP restano sotto secret scanning e bloccano il deploy se
  # finiscono accidentalmente in un artefatto.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SITE_URL,SMTP_HOST,SMTP_PORT,SMTP_SECURE,SMTP_FROM"

# Runtime Next.js ufficiale (App Router, Server Actions, middleware).
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Netlify applica questi header agli asset serviti direttamente dalla propria CDN.
# Le route dinamiche Next continuano a ricevere anche gli header definiti in next.config.mjs.

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; upgrade-insecure-requests"
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-Permitted-Cross-Domain-Policies = "none"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"
    CDN-Cache-Control = "public, max-age=604800, stale-while-revalidate=604800"

