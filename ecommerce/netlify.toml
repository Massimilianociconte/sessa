[build]
  command = "npx prisma generate && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  NEXT_TELEMETRY_DISABLED = "1"

# Runtime Next.js ufficiale (App Router, Server Actions, middleware).
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Netlify applica questi header agli asset serviti direttamente dalla propria CDN.
# Le route dinamiche Next continuano a ricevere anche gli header definiti in next.config.mjs.

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/brand/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/patterns/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/stickers/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/products/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"
    CDN-Cache-Control = "public, max-age=604800, stale-while-revalidate=604800"
    Cloudflare-CDN-Cache-Control = "public, max-age=604800, stale-while-revalidate=604800"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/offline.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "private, no-store, max-age=0, must-revalidate"
    CDN-Cache-Control = "no-store"
    Cloudflare-CDN-Cache-Control = "no-store"

[[headers]]
  for = "/checkout*"
  [headers.values]
    Cache-Control = "private, no-store, max-age=0, must-revalidate"
    CDN-Cache-Control = "no-store"
    Cloudflare-CDN-Cache-Control = "no-store"

[[headers]]
  for = "/carrello*"
  [headers.values]
    Cache-Control = "private, no-store, max-age=0, must-revalidate"
    CDN-Cache-Control = "no-store"
    Cloudflare-CDN-Cache-Control = "no-store"

[[headers]]
  for = "/account"
  [headers.values]
    Cache-Control = "private, no-store, max-age=0, must-revalidate"
    CDN-Cache-Control = "no-store"
    Cloudflare-CDN-Cache-Control = "no-store"

[[headers]]
  for = "/account/*"
  [headers.values]
    Cache-Control = "private, no-store, max-age=0, must-revalidate"
    CDN-Cache-Control = "no-store"
    Cloudflare-CDN-Cache-Control = "no-store"

[[headers]]
  for = "/admin"
  [headers.values]
    Cache-Control = "private, no-store, max-age=0, must-revalidate"
    CDN-Cache-Control = "no-store"
    Cloudflare-CDN-Cache-Control = "no-store"

[[headers]]
  for = "/admin/*"
