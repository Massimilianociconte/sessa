<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#D65A1F" />
    <title>Sei offline — Sessa 1930</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 84% -4%, rgba(216, 90, 36, 0.08), transparent 34%),
          linear-gradient(180deg, #fff7ed 0%, #faf6ef 60%, #fff7ed 100%);
        color: #171412;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        padding: 1.5rem;
      }
      .wrap {
        display: grid;
        gap: 2.2rem;
        align-items: center;
        max-width: 60rem;
        width: 100%;
      }
      @media (min-width: 760px) {
        .wrap {
          grid-template-columns: 1fr 1.05fr;
        }
      }
      .brand {
        color: #d65a1f;
        font-size: 3.4rem;
        font-family: Georgia, "Times New Roman", serif;
        font-style: italic;
        line-height: 1;
        margin: 0;
      }
      .kicker {
        margin: 1rem 0 0;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.34em;
        text-transform: uppercase;
        color: rgba(216, 90, 31, 0.85);
      }
      h1 {
        margin: 0.6rem 0 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2.4rem, 6vw, 3.6rem);
        font-weight: 600;
        line-height: 0.95;
      }
      p.copy {
        margin: 1.1rem 0 0;
        max-width: 30rem;
        font-size: 1rem;
        line-height: 1.7;
        color: rgba(23, 20, 18, 0.66);
      }
      .actions {
        margin-top: 1.7rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
      }
      button,
      a.btn {
        border: 0;
        border-radius: 999px;
        background: #d65a1f;
        color: #faf6ef;
        font-weight: 700;
        font-size: 0.85rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        padding: 0.9rem 1.8rem;
        cursor: pointer;
        text-decoration: none;
        box-shadow: 0 14px 30px rgba(216, 90, 36, 0.28);
      }
      a.btn.secondary {
        background: rgba(255, 255, 255, 0.7);
        border: 1px solid rgba(216, 90, 31, 0.4);
        color: #d65a1f;
        box-shadow: none;
      }
      .art {
        border: 1px solid rgba(216, 90, 31, 0.2);
        border-radius: clamp(24px, 3vw, 36px);
        background: linear-gradient(135deg, rgba(255, 247, 237, 0.92), rgba(255, 255, 255, 0.64));
        padding: clamp(0.55rem, 1.2vw, 0.9rem);
        box-shadow: 0 32px 84px rgba(23, 20, 18, 0.16);
      }
      .art-img {
        width: 100%;
        aspect-ratio: 4 / 3;
        border-radius: calc(clamp(24px, 3vw, 36px) - 0.55rem);
        background: url("/images/404/sessa-ti-sei-perso.webp") center / cover no-repeat, #fff2e3;
      }
      .hint {
        margin-top: 1.4rem;
        font-size: 0.78rem;
        color: rgba(23, 20, 18, 0.45);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div>
        <p class="brand">Sessa</p>
        <p class="kicker">Connessione assente</p>
        <h1>Ti sei perso?</h1>
        <p class="copy">
          In questo momento sei offline e questa pagina non è in dispensa. Controlla la connessione
          e riprova: sfogliatelle, box regalo e specialità ti aspettano.
        </p>
        <div class="actions">
          <button onclick="location.reload()">Riprova</button>
          <a class="btn secondary" href="/">Torna allo shop</a>
        </div>
        <p class="hint">La pagina si ricarica da sola appena torni online.</p>
      </div>
      <div class="art" aria-hidden="true">
        <div class="art-img"></div>
      </div>
    </div>
    <script>
      window.addEventListener("online", function () {
        location.reload();
      });
    </script>
  </body>
</html>
